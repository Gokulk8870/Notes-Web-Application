<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Notes</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="card-body  w-100 h-100">
           
            <h3 class="title text-center text-dark bg-danger bg-gradient bg-opacity-50 p-3">My Notes</h3>
            <div class="msg">
                
            </div>
            <div class="add">
                <div class="popup-overlay"></div>
                <div class="popup-box">
                    <h2 class="text-white">Add Note...</h2>
                    <form action="">
                        <div class="form-group">
                            <input type="text" id="note-title" class="form-control mb-3" placeholder="Title">
                            <textarea name="content" id="content" class="form-control mb-3" placeholder="Content"></textarea>
                            <button class="btn bg-primary m-2" id="add-note">Add</button><button class="btn bg-primary" id="cancel-note">Cancel</button>
                        </div>
                    </form>
                </div>
                 <button id="add-popup" class="btn btn-danger rounded-circle  position-fixed bottom-0 end-0 m-3">
                <i class="fa-solid fa-plus fa-1x"></i>
                </button>
            </div>
           
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
